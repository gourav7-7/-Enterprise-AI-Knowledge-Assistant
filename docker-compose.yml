services:
  # db:
  #   image: postgres:16
  #   environment:
  #     POSTGRES_USER: ${POSTGRES_USER}
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  #     POSTGRES_DB: ${POSTGRES_DB}
  #   volumes:
  #     - pgdata:/var/lib/postgresql/data        # named volume -> DB survives restarts
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
  #     interval: 5s
  #     timeout: 5s
  #     retries: 10
    # Not exposed to the host (avoids clashing with a local Postgres on 5432).
    # Inspect with: docker compose exec db psql -U $POSTGRES_USER -d $POSTGRES_DB

  api:
    build: .
    env_file: .env                              # OPENAI_API_KEY, JWT_*, etc. injected at runtime
    # environment:
      # Inside the compose network the DB host is the service name "db", not localhost.
      # DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    # depends_on:
      # db:
      #   condition: service_healthy              # wait until Postgres passes its healthcheck
    volumes:
      - ./data/chroma:/app/data/chroma           # vectors persist across rebuilds
      - ./data/uploads:/app/data/uploads         # uploaded PDFs persist
    ports:
      - "8000:8000"

  ui:
    build: .
    command: streamlit run frontend/streamlit_app.py --server.port 8501 --server.address 0.0.0.0 --server.headless true
    environment:
      API_BASE_URL: http://api:8000              # reach the API by service name
    depends_on:
      - api
    ports:
      - "8501:8501"

